# Databricks Asset Bundle: App + scheduled sync job.
# Set bundle variables (or override in target) and configure secrets in the workspace.

resources:
  apps:
    worldcup_pool_app:
      name: "worldcup-pool-${bundle.target}"
      description: "World Cup 2026 prediction pool (FastAPI + React + Lakebase)"
      source_code_path: ..

  jobs:
    worldcup_sync_matches:
      name: "[${bundle.target}] worldcup sync matches"
      max_concurrent_runs: 1
      performance_target: STANDARD
      schedule:
        # Once a day
        quartz_cron_expression: "0 0 0 * * ?"
        timezone_id: "UTC"
      environments:
        - environment_key: serverless_default
          spec:
            client: "2"
            dependencies:
              - "databricks-sdk>=0.81.0"
              - "sqlalchemy>=2.0.0"
              - "psycopg[binary]>=3.2.0"
              - "httpx>=0.27.0"
              - "pandas>=2.2.0"
      tasks:
        - task_key: sync_matches
          environment_key: serverless_default
          spark_python_task:
            python_file: ../scripts/databricks_sync.py
            parameters:
              - "--lakebase-endpoint"
              - "${var.lakebase_endpoint}"
              - "--football-data-competition"
              - "${var.football_data_competition}"
              - "--lakebase-database"
              - "databricks_postgres"
              - "--prediction-lock-before-kickoff-hours"
              - "1"
              - "--football-data-token"
              - "{{secrets/worldcup_pool/football_data_token}}"

        # Lakebase → UC Delta mirror for the AI/BI dashboard + Genie demo.
        # Runs after sync_matches so the snapshot is consistent with the latest
        # scorelines, using the same serverless job environment.
        - task_key: lakebase_to_delta
          depends_on:
            - task_key: sync_matches
          environment_key: serverless_default
          spark_python_task:
            python_file: ../scripts/databricks_lakebase_to_delta.py
            parameters:
              - "--lakebase-endpoint"
              - "${var.lakebase_endpoint}"
              - "--lakebase-database"
              - "databricks_postgres"
              - "--demo-catalog"
              - "${var.demo_catalog}"
              - "--demo-schema"
              - "${var.demo_schema}"
